name: Build FanchmWrt for Hlink HT2

on:
  workflow_dispatch:
    inputs:
      firmware_size:
        description: '固件分区大小 (MB)'
        required: true
        type: choice
        default: '1024'
        options:
          - '512'
          - '1024'
          - '2048'
          - '4096'
          - '8192'
      enable_wifi:
        description: '是否开启 WiFi'
        required: true
        type: boolean
        default: true
      lan_ip:
        description: 'LAN 口 IP 地址'
        required: true
        type: string
        default: '192.168.1.1'
      keep_debug:
        description: '是否保留调试符号（不勾选固件更小）'
        required: false
        type: boolean
        default: false

env:
  REPO_URL: https://github.com/Winter21c/fanchmwrt-for-ht2.git
  TARGET: rockchip
  SUBTARGET: armv8
  DEVICE: hlink_ht2

jobs:
  build:
    name: 编译 FanchmWrt 固件
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache ecj fastjar file g++ gawk \
            gettext git java-propose-classpath libelf-dev \
            libncurses5-dev libncursesw5-dev libssl-dev \
            python3 python3-dev python3-distutils \
            python3-setuptools rsync subversion swig time \
            unzip wget xsltproc zlib1g-dev \
            bison flex perl perl-base perl-modules \
            libparse-yapp-perl patchutils \
            device-tree-compiler

      - name: 克隆仓库
        run: |
          git clone $REPO_URL openwrt
          cd openwrt

      - name: 更新并安装 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成种子配置
        run: |
          cd openwrt

          # Start from the target defconfig
          cat > .config << 'SEEDEOF'
          CONFIG_MODULES=y
          CONFIG_HAVE_DOT_CONFIG=y
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_hlink_ht2=y
          CONFIG_TARGET_BOARD="rockchip"
          CONFIG_TARGET_SUBTARGET="armv8"
          CONFIG_TARGET_PROFILE="DEVICE_hlink_ht2"
          CONFIG_LINUX_6_6=y
          SEEDEOF

          # Expand the config using defconfig
          make defconfig

      - name: 应用自定义配置
        run: |
          cd openwrt
          bash ../scripts/customize-config.sh \
            "${{ github.event.inputs.firmware_size }}" \
            "${{ github.event.inputs.enable_wifi }}" \
            "${{ github.event.inputs.lan_ip }}" \
            "${{ github.event.inputs.keep_debug }}"

      - name: 下载源码包
        run: |
          cd openwrt
          make download -j$(nproc) V=s

      - name: 编译固件
        run: |
          cd openwrt
          make -j$(nproc) V=s || make -j1 V=s

      - name: 整理固件
        run: |
          mkdir -p output
          cp -r openwrt/bin/targets/rockchip/armv8/* output/ 2>/dev/null || true
          # Rename for clarity
          cd output
          for f in *.img.gz; do
            [ -f "$f" ] || continue
            newname=$(echo "$f" | sed "s/.img.gz/_${{ github.run_id }}.img.gz/")
            mv "$f" "$newname" 2>/dev/null || true
          done
          cd ..
          echo "生成的固件文件:"
          find output -type f

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: fanchmwrt-ht2-${{ github.run_id }}
          path: output/
          retention-days: 30

      - name: 编译摘要
        run: |
          echo "================================"
          echo "  FanchmWrt 编译完成！"
          echo "================================"
          echo "目标设备: Hlink HT2 (RK3528)"
          echo "固件大小: ${{ github.event.inputs.firmware_size }} MB"
          echo "WiFi 状态: ${{ github.event.inputs.enable_wifi == 'true' && '已开启' || '已关闭' }}"
          echo "LAN IP:    ${{ github.event.inputs.lan_ip }}"
          echo "================================"
          echo "固件文件位于:"
          ls -lh output/
